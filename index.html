<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>ありがとうございます、先生</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Sakura background container -->
    <div id="sakura-container"></div>

    <!-- Countdown Screen -->
    <div id="countdown-screen" class="screen">
        <div style="text-align: center; z-index: 2001;">
            <h1
                style="color: #ff9a9e; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 30px; text-shadow: 0 0 15px rgba(255, 154, 158, 0.5);">
                🌸 Opening Soon 🌸</h1>
            <div id="countdown-timer"
                style="display: flex; gap: clamp(10px, 3vw, 20px); justify-content: center; color: #fff;">
                <div class="time-box"><span id="cd-days">00</span><small>Days</small></div>
                <div class="time-box"><span id="cd-hours">00</span><small>Hrs</small></div>
                <div class="time-box"><span id="cd-minutes">00</span><small>Min</small></div>
                <div class="time-box"><span id="cd-seconds">00</span><small>Sec</small></div>
            </div>
            <p style="margin-top: 30px; font-size: clamp(1rem, 3vw, 1.2rem); color: #ffb7c5; letter-spacing: 1px;">March
                14, 2026</p>
        </div>
    </div>

    <!-- Volume Check Modal -->
    <div id="volume-check-modal" class="modal-overlay">
        <div class="modal-box" style="text-align: center; max-width: 90%; width: 320px;">
            <div
                style="font-size: 3.5rem; margin-bottom: 10px; animation: bounceDown 1s infinite alternate ease-in-out;">
                🔊</div>
            <h2 style="color: #d81b60; margin-bottom: 15px; font-size: 1.5rem;">Turn Up Your Volume!</h2>
            <button id="btn-volume-ok" class="primary-btn pulse" style="font-size: 1.1rem; padding: 12px 24px;">I'm
                Ready! 👍</button>
        </div>
    </div>

    <!-- Welcome Screen -->
    <div id="welcome-screen" class="screen active">
        <button id="btn-hi-sensei" class="primary-btn pulse">こんにちは</button>
    </div>

    <!-- Main Stage Screen -->
    <div id="main-screen" class="screen">
        <div class="japan-sun"></div>

        <div class="clouds">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
            <div class="cloud cloud-4"></div>
            <div class="cloud cloud-5"></div>
            <div class="cloud cloud-6"></div>
            <div class="cloud cloud-7"></div>
            <div class="cloud cloud-8"></div>
            <div class="cloud cloud-9"></div>
            <div class="cloud cloud-10"></div>
        </div>

        <div class="stage-container">
            <!-- Stage background/curtains -->
            <div class="curtain left-curtain">
                <div class="lantern">🏮</div>
            </div>
            <div class="curtain right-curtain">
                <div class="lantern">🏮</div>
            </div>

            <div class="stage-floor">
                <!-- Characters will appear here -->
                <div id="characters-area"></div>
            </div>
        </div>

        <!-- Hint Message for Show Students -->
        <div id="touch-hint" class="touch-hint bounce">
            <span class="hint-text">先生、ここを押してください！<br><small>(Sensei, please tap here!)</small></span>
            <div class="hint-arrow">⬇️</div>
        </div>

        <!-- Student Drawer Toggle -->
        <button id="btn-toggle-drawer" class="secondary-btn">Show Students</button>

        <!-- Student Drawer -->
        <div id="student-drawer" class="drawer hidden">
            <div class="drawer-content" id="student-buttons-container">
                <!-- Buttons will be injected via JS -->
            </div>
        </div>

        <!-- Final Thank You Trigger -->
        <button id="btn-let-us-thank" class="primary-btn hidden">LET US THANK YOU</button>

        <!-- Custom Alert Modal -->
        <div id="custom-alert" class="modal-overlay hidden">
            <div class="modal-box">
                <img src="assets/cat-memes/cat1.gif" alt="Crying cat"
                    style="width: 150px; border-radius: 15px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto;">
                <p>Are you really going to leave without even reading our messages?😓</p>
                <button id="btn-alert-ok" class="secondary-btn">OK...</button>
            </div>
        </div>

        <!-- Student Message Modal -->
        <div id="student-message-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <h3 id="student-message-name"></h3>
                <p id="student-message-text" style="color: #4a148c; font-weight: 500;"></p>
                <button id="btn-close-message" class="primary-btn pulse"
                    style="font-size: 1rem; padding: 10px 20px;">❤️</button>
            </div>
        </div>
    </div>

    <!-- Final Animated Banner -->
    <div id="thank-you-banner" class="hidden">
        <div class="bg-cats">
            <img src="assets/cat-memes/cat2.gif" class="bg-cat cat-tl" alt="cat">
            <img src="assets/cat-memes/cat3.gif" class="bg-cat cat-tr" alt="cat">
            <img src="assets/cat-memes/cat4.gif" class="bg-cat cat-bl" alt="cat">
            <img src="assets/cat-memes/cat5.gif" class="bg-cat cat-br" alt="cat">
            <img src="assets/cat-memes/cat6.gif" class="bg-cat cat-tc" alt="cat">
        </div>
        <div class="banner-content">
            <h1>どうもありがとうございます</h1>
            <p>For all your guidance, patience, and inspiration.</p>
            <button id="btn-return" class="secondary-btn return-btn">Return 🌸</button>
            <div class="confetti-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
